global:
  scrape_interval: 1s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
  - job_name: node_exporter
    static_configs:
          - targets: [ "node-exporter:9100" ]
  - job_name: linko
    static_configs:
      - targets: [ "host.docker.internal:8899" ]
